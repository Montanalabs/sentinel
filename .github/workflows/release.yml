name: release

# Cut a release by pushing a version tag, e.g.  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release and upload assets
  packages: write # push the Docker image to GHCR

jobs:
  # Build a standalone `sentinel` binary per platform and attach it to the Release.
  binaries:
    name: binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: darwin-arm64, asset: sentinel-darwin-arm64 }
          # Intel macOS is cross-built on the Apple-Silicon runner with an x64 Node under Rosetta 2,
          # so it no longer depends on the retiring Intel `macos-13` runner (which left every release
          # without a darwin-x64 asset).
          - { os: macos-14, target: darwin-x64, asset: sentinel-darwin-x64, node_arch: x64 }
          - { os: ubuntu-latest, target: linux-x64, asset: sentinel-linux-x64 }
          - { os: ubuntu-24.04-arm, target: linux-arm64, asset: sentinel-linux-arm64 }
          - { os: windows-latest, target: win-x64, asset: sentinel-win-x64.exe }
    steps:
      - uses: actions/checkout@v4
      - name: Ensure Rosetta 2 (darwin-x64 cross-build)
        if: matrix.node_arch == 'x64'
        # Tolerate a non-zero exit when Rosetta is already present; a genuine absence surfaces later
        # when the x64 Node fails to exec.
        run: softwareupdate --install-rosetta --agree-to-license || true
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # official, statically-linked build — required for Node SEA
          architecture: ${{ matrix.node_arch || '' }} # x64 Node (via Rosetta) for the Intel build
      - run: npm ci
      - run: npm run build:binary
      # Normalize the produced binary to the release asset name.
      - name: Stage asset (unix)
        if: runner.os != 'Windows'
        run: mv build/sentinel "build/${{ matrix.asset }}"
      - name: Stage asset (windows)
        if: runner.os == 'Windows'
        run: move build\sentinel.exe build\${{ matrix.asset }}
      - name: Smoke test
        run: ./build/${{ matrix.asset }} version
        shell: bash
      - uses: softprops/action-gh-release@v2
        with:
          files: build/${{ matrix.asset }}

  # Build and push the Docker image to GHCR. Required: the docs present this image as a primary
  # container-deploy path, so a failed push must fail the release. Needs the org's Actions workflow
  # permissions set to "Read and write" (Org/Repo Settings -> Actions -> General), or GITHUB_TOKEN
  # swapped for a PAT with write:packages.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # GHCR names must be lowercase; the version tag is the git tag WITHOUT the leading `v`, so the
      # published tag matches what the docs/manifest tell users to pull (e.g. `:1.0.0`, not `:v1.0.0`).
      - name: Image name + version
        run: |
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ env.VERSION }}
