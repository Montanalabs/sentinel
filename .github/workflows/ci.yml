name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: typecheck + test + eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run eval # deterministic prod-readiness eval (smoke; assertions run in npm test)

  integration:
    name: integration (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U sentinel"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    env:
      SENTINEL_TEST_DATABASE_URL: postgres://sentinel:sentinel@localhost:5432/sentinel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Exercises the Postgres provenance store, the HA concurrent-writer stress test, and the
      # Postgres protocol stores (nonce/receipt/execution) against a real database.
      - run: npm run test:int
