# Production Sentinel sidecar on Kubernetes / EKS.
#
#   1. create the secret values below (DO NOT commit real secrets — use a sealed secret / external-secrets / SSM)
#   2. kubectl apply -f deploy/k8s/sentinel.yaml
#
# Topology: N stateless sidecar replicas sharing one Postgres (RDS or in-cluster). The provenance
# chain and the single-use nonce ledger are safe under concurrent writers, so you can scale replicas
# and roll them. The /v1/* API is UNAUTHENTICATED — keep this Service private and front it with an
# ingress/mTLS/API gateway that does authn/z. See docs/deploying.md.
---
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-secrets
  namespace: sentinel
type: Opaque
stringData:
  # Stable Ed25519 signing seed (base64, 32 bytes). Generate with: sentinel keygen
  # A stable seed is REQUIRED in production so the provenance chain verifies across restarts/replicas.
  SENTINEL_SIGNING_SEED: "REPLACE_WITH_sentinel_keygen_OUTPUT"
  # Shared Postgres (e.g. RDS). All replicas MUST point at the same database.
  SENTINEL_DATABASE_URL: "postgres://sentinel:CHANGEME@your-rds-endpoint:5432/sentinel"
  # Only if using a real second-opinion provider:
  ANTHROPIC_API_KEY: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel
  namespace: sentinel
spec:
  replicas: 2
  selector:
    matchLabels: { app: sentinel }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 } # zero-downtime rolling restart
  template:
    metadata:
      labels: { app: sentinel }
    spec:
      # The image runs as the unprivileged `node` user; enforce it at the pod level too.
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      terminationGracePeriodSeconds: 30 # lets the SIGTERM handler drain in-flight /v1 requests
      containers:
        - name: sentinel
          image: ghcr.io/montanalabs/sentinel:1.0.0 # pin a released tag
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 4000 }
          env:
            - { name: SENTINEL_HOST, value: "0.0.0.0" } # bind all interfaces inside the pod
            - { name: SENTINEL_SIDECAR_PORT, value: "4000" }
            - { name: SENTINEL_PROTOCOL_ENABLED, value: "1" }
            - { name: SENTINEL_SECOND_OPINION_PROVIDER, value: "anthropic" }
            - { name: SENTINEL_SECOND_OPINION_MODEL, value: "claude-sonnet-4-6" }
            # The /v1/* surface is unauthenticated — rate-limit it even behind a gateway.
            - { name: SENTINEL_RATE_LIMIT_BURST, value: "200" }
            - { name: SENTINEL_RATE_LIMIT_RPS, value: "100" }
          envFrom:
            - secretRef: { name: sentinel-secrets }
          livenessProbe: # process is up — does NOT touch the DB
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe: # store reachable — drains the pod if Postgres is down
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel
  namespace: sentinel
spec:
  type: ClusterIP # keep private; expose via a gateway/ingress that enforces auth
  selector: { app: sentinel }
  ports:
    - { name: http, port: 80, targetPort: http }
